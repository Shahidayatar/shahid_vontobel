name: Backend CI/CD - Deploy to Azure Web App

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ./backend
        run: npm install

      - name: Build (TypeScript)
        working-directory: ./backend
        run: npm run build

      - name: Prepare standalone deploy folder
        shell: bash
        run: |
          DEPLOY_DIR="$RUNNER_TEMP/backend-deploy"
          rm -rf "$DEPLOY_DIR"
          mkdir -p "$DEPLOY_DIR"
          cp backend/package.json "$DEPLOY_DIR/package.json"
          cp -R backend/dist "$DEPLOY_DIR/dist"
          cd "$DEPLOY_DIR"
          npm install --omit=dev
          zip -r "$GITHUB_WORKSPACE/backend-deploy.zip" package.json package-lock.json node_modules dist

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: shahid-vontobel-api
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./backend-deploy.zip
